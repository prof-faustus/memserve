name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then echo "needs gofmt:"; echo "$unformatted"; exit 1; fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test -race (all tests, no skips)
        run: go test -race -count=1 ./...

  aerospike-adapter:
    # The Aerospike adapter is behind the `aerospike` build tag and needs the client
    # library; this job confirms it compiles. It does not gate the build (no cluster in CI).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: build + vet -tags aerospike (incl. conformance test)
        run: |
          go get github.com/aerospike/aerospike-client-go/v7
          go build -tags aerospike ./...
          go vet -tags aerospike ./...
