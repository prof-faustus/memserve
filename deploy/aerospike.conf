# Minimal single-node Aerospike config for MemServe development.
# The `memserve` namespace stores the TxIndex/UTXO/Subtree/Block/Header/spentidx sets.
service {
    proto-fd-max 15000
}

logging {
    console {
        context any info
    }
}

network {
    service {
        address any
        port 3000
    }
    heartbeat {
        mode multicast
        multicast-group 239.1.99.222
        port 9918
        interval 150
        timeout 10
    }
    fabric {
        port 3001
    }
    info {
        port 3003
    }
}

namespace memserve {
    replication-factor 1
    default-ttl 0            # MemServe manages retention via spend-depth pruning, not TTL
    nsup-period 120
    storage-engine memory {
        data-size 4G         # dev sizing; production sizes to live-UTXO + D-block spend buffer
    }
}
